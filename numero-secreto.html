
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Juego Número Secreto</title>

</head>
<body>

<nav>
  <h2>Warlli.dev</h2>
  <ul>
    <li><a href="index.html">Inicio</a></li>
    <li><a href="proyectos.html">Proyectos</a></li>
  </ul>

<section class="game-container">

  <center>
<h1>🎯 Adivina el Número</h1>

<p class="sub">Elige un número del 1 al 10</p>

  </center>
  

  <div class="card game-card">

    <button class="btn big" onclick="generarNumero()">🎲 Generar Número</button>

    <div class="input-group">
      <input type="number" id="numero" placeholder="Tu número">
      <button class="btn intentar" onclick="intentar()">Intentar</button>
    </div>

    <div class="acciones">
      <button class="btn reset" onclick="reiniciar()">Reiniciar</button>
    </div>

    <p id="mensaje"></p>
    <p id="intentos"></p>

    <div class="barra">
      <div class="progreso" id="barra"></div>
    </div>

  </div>

</section>
